services:
  db:
    image: postgres:17
    container_name: tasks_db

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: tasks_app

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: